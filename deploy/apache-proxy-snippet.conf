# Apache: exclude GETtoPOSTforAI from the reverse proxy
#
# If the VirtualHost uses a catch-all proxy (e.g. to localhost:8000),
# /GETtoPOSTforAI/ must be served directly from DocumentRoot like other PHP apps.
# Otherwise Apache returns 503 because the backend is unreachable.
#
# Add this to the SSL VirtualHost before the catch-all ProxyPass /:

    ProxyPass /GETtoPOSTforAI/ !

# After deployment:
#   apache2ctl configtest && systemctl reload apache2
#
# Writable directory for SQLite (www-data must be able to create macro_generator.db):
#   chown www-data:www-data /var/www/html/GETtoPOSTforAI
#   chmod 775 /var/www/html/GETtoPOSTforAI