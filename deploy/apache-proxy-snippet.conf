# Apache: GETtoPOSTforAI vom Reverse-Proxy ausschließen
#
# Wenn der VirtualHost einen Catch-All-Proxy nutzt (z. B. auf localhost:8000),
# muss /GETtoPOSTforAI/ wie andere PHP-Apps direkt aus DocumentRoot serviert werden.
# Sonst liefert Apache 503, weil das Backend nicht erreichbar ist.
#
# In den SSL-VirtualHost einfügen, vor dem Catch-All ProxyPass /:

    ProxyPass /GETtoPOSTforAI/ !

# Nach dem Deployment:
#   apache2ctl configtest && systemctl reload apache2
#
# Schreibrechte für SQLite (www-data muss macro_generator.db anlegen können):
#   chown www-data:www-data /var/www/html/GETtoPOSTforAI
#   chmod 775 /var/www/html/GETtoPOSTforAI